version: 2

sources:
  - name: home_credit_raw
    description: "Raw layer dari Kaggle Home Credit Default Risk dataset."
    database: "potent-catwalk-484317-n0"
    schema: raw_layer
    config:
      tags: ['home_credit', 'raw']

    tables:
      - name: application_train
        description: "Data aplikasi kredit utama beserta label target (TARGET)."
        columns:
          - name: SK_ID_CURR
            description: "Primary key aplikasi kredit."
            tests:
              - not_null
              - unique

      - name: bureau
        description: "Data historis kredit nasabah dari biro kredit eksternal."
        columns:
          - name: SK_ID_BUREAU
            description: "Primary key record biro kredit."
            tests:
              - not_null
              - unique
          - name: SK_ID_CURR
            description: "Foreign key ke application_train."
            tests:
              - not_null
              - relationships:
                  arguments:           # 💡 FORMAT BARU DBT v1.11+
                    to: source('home_credit_raw', 'application_train')
                    field: SK_ID_CURR
                  config:
                    severity: warn

models:
  - name: stg_loans
    description: "Staging model untuk data aplikasi kredit."
    columns:
      - name: application_id
        description: "Primary key aplikasi."
        tests:
          - unique
          - not_null
          
  - name: stg_bureau
    description: "Staging model untuk histori biro kredit."
    columns:
      - name: bureau_id
        description: "Primary key histori biro."
        tests:
          - unique
          - not_null
      - name: application_id
        description: "Foreign key ke stg_loans."
        tests:
          - not_null
          - relationships:
              arguments:               # 💡 FORMAT BARU DBT v1.11+
                to: ref('stg_loans')
                field: application_id
              config:
                severity: warn